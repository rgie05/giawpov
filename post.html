<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: 'Space Grotesk', sans-serif; line-height: 1.8; }
        .navbar { background-color: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .nav-link { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .line-border { border-top: 1px solid rgba(255,255,255,0.12); width: 100%; }
        .post-title { font-size: clamp(2rem, 5vw, 4rem); font-weight: 700; line-height: 1.1; letter-spacing: -2px; }
        .content-body { font-size: 1.1rem; color: rgba(255,255,255,0.8); white-space: pre-wrap; text-align: justify; }
        .label-pill { font-size: 0.7rem; border: 1px solid rgba(255,255,255,0.3); padding: 5px 15px; border-radius: 50px; text-transform: uppercase; color: #fff; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><img src="img.png" alt="Logo" style="width: 38px;"></a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="blog.html">Curhat Dong Mah</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5 mt-5">
        <div id="post-detail">
            <div class="py-5 text-center opacity-50">Menarik data dari hayalanmu...</div>
        </div>
        
        <div class="mt-5 pt-5">
            <a href="blog.html" class="text-white text-decoration-none small" style="letter-spacing: 2px;">← KEMBALI KE CURHATAN</a>
        </div>
    </div>

    <script>
        // Ambil ID dari URL (?id=0)
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        fetch('posts.json')
            .then(res => res.json())
            .then(data => {
                const post = data[id];
                if(post) {
                    document.title = post.title;
                    document.getElementById('post-detail').innerHTML = `
                        <div class="mb-4">
                            <span class="label-pill">${post.tag}</span>
                            <span class="ms-3 opacity-50 small">${post.date}</span>
                        </div>
                        <h1 class="post-title mb-5">${post.title}</h1>
                        <div class="line-border mb-5"></div>
                        <div class="content-body">${post.content}</div>
                    `;
                } else {
                    document.getElementById('post-detail').innerHTML = "<h1>Curhatan tidak ditemukan, Ji.</h1>";
                }
            })
            .catch(err => console.error("Error panggil data:", err));
    </script>
</body>
</html>
