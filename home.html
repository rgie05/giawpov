<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curhat Dong Mah!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: 'Space Grotesk', sans-serif; line-height: 1.6; overflow-x: hidden; }
        .navbar { background-color: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .nav-link { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; }
        .huge-text { font-size: clamp(3rem, 10vw, 6rem); font-weight: 700; line-height: 0.9; letter-spacing: -4px; text-transform: uppercase; }
        .outline-text { -webkit-text-stroke: 1px rgba(255,255,255,0.3); color: transparent; }
        .text-primary-custom { color: #fff; }
        .line-border { border-top: 1px solid rgba(255,255,255,0.12); width: 100%; }
        .blog-item { padding: 40px 0; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.4s; }
        .label-pill { font-size: 0.65rem; border: 1px solid rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 50px; text-transform: uppercase; letter-spacing: 1px; }
        footer { border-top: 1px solid rgba(255,255,255,0.08); padding: 60px 0; margin-top: 100px; opacity: 0.6; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="img.png" alt="Logo" style="width: 32px; filter: invert(1);">
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="home.html">Home</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <header class="mb-5">
            <div class="row align-items-end">
                <div class="col-lg-7">
                    <div class="huge-text">
                        CURHAT <br> 
                        <span class="outline-text">DONG</span> <br> 
                        MAH<span class="text-primary-custom">.</span>
                    </div>
                </div>
               <div class="col-lg-5">
                <div class="spotify-container mb-4 ps-lg-4">
                    <iframe style="border-radius:12px" 
                        src="https://open.spotify.com/embed/playlist/6DxCEktDmKmbqWlvVXLejt" 
                        width="100%" height="152" frameBorder="0" allowfullscreen="" 
                        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
                    </iframe>
                </div>

                <p class="quote-text ps-lg-4" style="border-left: 1px solid rgba(255,255,255,0.2);">
                    "<strong>Rad</strong>upnya <strong>sa</strong>at <strong>ter</strong>puruk <strong>ac</strong>apkali m<strong>sh</strong>ad <strong>d</strong>i <strong>jo</strong>ntunya <strong>fe</strong>el <strong>mi</strong>mpi <strong>bi</strong>ar men<strong>jol</strong>ang <strong>ri</strong>ndu <strong>ye</strong>ng <strong>ak</strong>an men<strong>jul</strong>ur <strong>ra</strong>ih b<strong>rav</strong>o <strong>jon</strong>!"
                </p>
            </div>
        </header>

        <div class="line-border mb-5"></div>

        <div id="blog-container">
            <p class="opacity-50">Sedang memuat tulisan...</p>
        </div>
    </div>

    <footer class="text-center">
        <div class="container">
            <p>&copy; 2026 @g3prg..</p>
        </div>
    </footer>

<script>
    fetch('posts.json')
        .then(response => {
            if (!response.ok) {
                throw new Error('File posts.json tidak ditemukan');
            }
            return response.json();
        })
        .then(data => {
            const container = document.getElementById('blog-container');
            
            container.innerHTML = data.map((post, index) => `
                <div class="blog-item text-start">
                    <div class="mb-2">
                        <span class="label-pill">${post.tag || 'GENERAL'}</span>
                        <span class="small opacity-50 ms-2">${post.date || 'April 13, 2026'}</span>
                    </div>
                    <h2 class="fw-bold mb-3" style="font-size: 1.8rem;">
                        <a href="post.html?id=${index}" class="text-white text-decoration-none" style="transition:0.3s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">
                            ${post.title.toUpperCase()}
                        </a>
                    </h2>
                    <p style="color: rgba(255,255,255,0.7); max-width: 800px;">
                        ${post.content.substring(0, 150)}... 
                        <a href="post.html?id=${index}" class="small text-white-50 text-decoration-none">/ baca selengkapnya</a>
                    </p>
                </div>
            `).join('');
        })
        .catch(err => {
            console.error('Error:', err);
            document.getElementById('blog-container').innerHTML = `
                <p class="p-5 opacity-50">Gagal memuat konten.</p>
            `;
        });
</script>
